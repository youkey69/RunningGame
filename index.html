<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Pixel Marathon</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="レース情報">
        <div>
          <p class="label">PACE</p>
          <p><span id="pace">Normal</span></p>
        </div>
        <div>
          <p class="label">STAMINA</p>
          <div class="meter" aria-label="スタミナ">
            <span id="staminaBar"></span>
          </div>
        </div>
        <div class="distance">
          <p class="label">G</p>
          <p><span id="gold">0</span> G</p>
        </div>
      </section>

      <canvas id="game" width="960" height="540" aria-label="横スクロール型マラソンアクションRPG"></canvas>

      <section class="controls" aria-label="操作説明">
        <dl class="control-guide">
          <div><dt>奥へ</dt><dd>⇧スワイプ・⇧キー</dd></div>
          <div><dt>手前へ</dt><dd>⇩スワイプ・⇩キー</dd></div>
          <div><dt>加速</dt><dd>⇨スワイプ・⇨キー</dd></div>
          <div><dt>減速</dt><dd>⇦スワイプ・⇦キー</dd></div>
        </dl>
      </section>

      <aside class="message" id="message">
        <h1>Pixel Marathon</h1>
        <p>ライバルを避けながらゴールを目指そう！紙コップでスタミナ回復！</p>
        <button id="start" type="button">START</button>
      </aside>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
